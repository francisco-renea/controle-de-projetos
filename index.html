<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Controle de Projetos</title>

  <!-- Fuse.js -->
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>

  <style>
    body { font-family: Arial; padding: 20px; }
    input { width: 300px; padding: 8px; margin-bottom: 15px; }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
    }

    tr:hover {
      background: #f5f5f5;
    }

    select {
      padding: 4px;
    }
  </style>
</head>
<body>

<h2>Controle de Projetos</h2>

<input type="text" id="search" placeholder="Buscar...">

<table id="tabela">
  <thead>
    <tr>
      <th>ID</th>
      <th>Revisão</th>
      <th>Extensão</th>
      <th>Assunto</th>
      <th>Abrir</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script src="app.js"></script>

</body>
</html>
